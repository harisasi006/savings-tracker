<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoFinance — Memory Friendly Payment Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Warning Alert Banner -->
  <div class="alert-banner container" id="alert-banner">
    <!-- Alert Triangle Icon -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <div class="alert-banner-text" id="alert-banner-text">Monthly limit warning details go here...</div>
  </div>

  <div class="container">
    
    <!-- Header -->
    <header class="app-header">
      <div class="app-title-wrap">
        <div class="app-logo">M</div>
        <h1 class="app-title">MemoFinance</h1>
      </div>
      <button class="btn-utility" id="open-settings-btn" style="flex: 0; padding: 0.6rem 1rem; border-radius: 12px;">
        <!-- Settings Gear SVG -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <!-- Dashboard & Chart Layout split -->
    <div class="dashboard-section">
      
      <!-- Dashboard Grid (4 cards) -->
      <div class="dashboard-grid">
        <div class="glass-panel card">
          <div class="card-label">My Savings</div>
          <div class="card-value blue" id="total-savings-val">₹0</div>
        </div>
        <div class="glass-panel card">
          <div class="card-label">Total Received</div>
          <div class="card-value green" id="total-received-val">₹0</div>
        </div>
        <div class="glass-panel card">
          <div class="card-label">Total Sent</div>
          <div class="card-value red" id="total-sent-val">₹0</div>
        </div>
        <div class="glass-panel card">
          <div class="card-label">Current Balance</div>
          <div class="card-value orange" id="remaining-balance-val">₹0</div>
        </div>
      </div>

      <!-- Donut Chart panel -->
      <div class="glass-panel chart-panel">
        <div class="card-label" style="margin-bottom: 0.5rem;">Category Spending</div>
        <div class="chart-container">
          <canvas id="chart-canvas" width="140" height="140"></canvas>
        </div>
        <div class="chart-legend" id="chart-legend">
          <!-- Slices legend injected via JS -->
        </div>
      </div>

    </div>

    <!-- Quick Add Transaction Form -->
    <div class="glass-panel">
      <h2 class="form-title">
        <!-- Plus Circle SVG -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Record Transaction
      </h2>
      <form id="tx-form" onsubmit="return false;">
        
        <!-- Sent vs Received Toggle -->
        <div class="type-toggle-container">
          <div class="type-toggle-btn sent active" id="toggle-sent">🔴 Money Sent (Debit)</div>
          <div class="type-toggle-btn received" id="toggle-received">🟢 Money Received (Credit)</div>
        </div>

        <div class="form-group">
          <label class="form-label" id="label-name" for="input-name">Who did you pay? (Person Name)</label>
          <input type="text" id="input-name" class="form-input" placeholder="e.g. John Doe, Shopkeeper, Friend" required>
        </div>
        
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div>
            <label class="form-label" id="label-amount" for="input-amount">Amount Sent (₹)</label>
            <input type="number" id="input-amount" class="form-input" placeholder="e.g. 500" min="1" required>
          </div>
          <div>
            <label class="form-label" for="input-date">Date of Transaction</label>
            <input type="date" id="input-date" class="form-input" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Category / Purpose</label>
          <div class="chips-container">
            <input type="radio" name="category" id="cat-loan" class="chip-input" value="Loan/Repayment" checked>
            <label for="cat-loan" class="chip-label">🤝 Loan/Debt</label>

            <input type="radio" name="category" id="cat-help" class="chip-input" value="Gift/Help">
            <label for="cat-help" class="chip-label">❤️ Gift/Help</label>

            <input type="radio" name="category" id="cat-food" class="chip-input" value="Food/Groceries">
            <label for="cat-food" class="chip-label">🍔 Food</label>

            <input type="radio" name="category" id="cat-shopping" class="chip-input" value="Shopping">
            <label for="cat-shopping" class="chip-label">🛍️ Shopping</label>

            <input type="radio" name="category" id="cat-medical" class="chip-input" value="Medical">
            <label for="cat-medical" class="chip-label">💊 Medical</label>

            <input type="radio" name="category" id="cat-other" class="chip-input" value="Other">
            <label for="cat-other" class="chip-label">⚙️ Other</label>
          </div>
          <!-- Custom category input (initially hidden) -->
          <input type="text" id="input-custom-category" class="form-input" style="margin-top: 0.75rem; display: none;" placeholder="Specify other purpose (e.g. Subscriptions, Travel)..." maxlength="25">
        </div>

        <div class="form-group" style="margin-top: 1.5rem;">
          <button type="submit" class="btn-submit" id="submit-btn">
            Save Payment Record
          </button>
        </div>
      </form>
    </div>

    <!-- People Directory Section -->
    <div class="people-section" id="people-section" style="display: none;">
      <h3 class="people-title">Quick History by Person (Tap name to view)</h3>
      <div class="people-list" id="people-list-container">
        <!-- Dynamic People Chips go here -->
      </div>
    </div>

    <!-- Transactions Log -->
    <div class="glass-panel">
      <div class="log-header">
        <h2 style="font-size: 1.25rem; display: flex; align-items: center; gap: 0.5rem;">
          <!-- History List SVG -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Transaction History
        </h2>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button class="btn-utility" id="print-pdf-btn" style="padding: 0.6rem 0.8rem; font-size: 0.8rem; border-radius: 10px; flex: 0;" title="Save PDF Report">
            🖨️ PDF
          </button>
          <input type="text" id="search-bar" class="form-input search-input" placeholder="Search by name...">
        </div>
      </div>

      <div class="tx-list" id="tx-list-container">
        <!-- Dynamic Collapsible Months injected via JS -->
      </div>
    </div>

    <!-- Backup & Utility Buttons -->
    <div class="utility-row">
      <button class="btn-utility" id="export-btn">
        <!-- Download SVG -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download Backup
      </button>
      <button class="btn-utility" id="import-btn-trigger">
        <!-- Upload SVG -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Restore Backup
      </button>
      <input type="file" id="import-file-input" style="display: none;" accept=".json">
    </div>

  </div> <!-- End Container -->

  <!-- Settings Modal (Edit Savings & Monthly Limits) -->
  <div class="modal" id="settings-modal">
    <div class="glass-panel modal-content">
      <button class="modal-close" id="close-settings-btn">&times;</button>
      <h3>Configure App</h3>
      <form id="settings-form" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label" for="savings-budget-input">Your Starting Savings (₹)</label>
          <input type="number" id="savings-budget-input" class="form-input" min="0" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="monthly-limit-input">Monthly Warning Limit (₹)</label>
          <input type="number" id="monthly-limit-input" class="form-input" min="0" required>
        </div>
        <button type="submit" class="btn-submit" id="save-settings-btn" style="padding: 0.8rem; font-size: 0.95rem; margin-bottom: 0.5rem;">
          Update Settings
        </button>
        <button type="button" class="btn-submit btn-danger" id="reset-db-btn">
          🗑️ Reset All App Data
        </button>
      </form>
    </div>
  </div>

  <!-- JS Controller -->
  <script src="app.js"></script>
</body>
</html>
